services:
  postgres:
    image: postgres:16-alpine
    container_name: 6xp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: 6xp-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: 6xp-api
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      SCAFFOLD_DATA_DIR: ${SCAFFOLD_DATA_DIR:-/data/6x-protocol}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
    ports:
      - "${API_PORT:-8787}:8787"
    volumes:
      - api_data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8787/healthz').read()"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: 6xp-worker
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    command: ["python", "-m", "app.worker"]
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      SCAFFOLD_DATA_DIR: ${SCAFFOLD_DATA_DIR:-/data/6x-protocol}
    volumes:
      - api_data:/data

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: 6xp-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-3000}:80"

volumes:
  postgres_data:
  redis_data:
  api_data:
