<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>6X-Protocol Web Edition (Scaffold)</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Inter, sans-serif;
      color: #e7edf8;
      background: radial-gradient(circle at top, #163156 0%, #0a1323 55%, #050b16 100%);
      min-height: 100vh;
      display: grid;
      place-items: center;
    }
    .panel {
      width: min(760px, 92vw);
      border: 1px solid rgba(125, 176, 255, 0.28);
      background: rgba(11, 22, 42, 0.76);
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 20px 60px rgba(4, 9, 20, 0.45);
    }
    h1 { margin: 0 0 8px; }
    p { margin: 8px 0; color: #b9c5da; }
    code {
      color: #9fd1ff;
      background: rgba(62, 116, 205, 0.2);
      padding: 2px 8px;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <main class="panel">
    <h1>6X-Protocol Web Edition</h1>
    <p>Compose scaffold is running.</p>
    <p>API health endpoint: <code>/healthz</code> on port <code>8787</code></p>
    <p>Next step: replace this placeholder with the real workflow dashboard frontend.</p>
  </main>
</body>
</html>
