name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile Python Sources
        run: |
          python -m compileall src main.py

      - name: Run Unit Tests
        run: |
          python -m unittest discover -s tests -p "test_*.py" -v
